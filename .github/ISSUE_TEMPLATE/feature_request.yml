name: "💡 Feature request / suggestion"
description: Suggest something to sync, improve, or add
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? Great. Note that some things are **intentionally not synced**
        (each player keeps their own character, skills, and quest progress — the
        Stardew model), so those aren't bugs.

  - type: textarea
    id: idea
    attributes:
      label: What would you like?
      description: Describe the feature or improvement.
      placeholder: e.g. "Sync NPC villager positions so we both see them in the same spot."
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why is it useful?
      description: What does it improve about playing together?
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I checked the README roadmap — this isn't already planned or intentionally out of scope
          required: false
        - label: I searched existing issues and this isn't a duplicate
          required: false
